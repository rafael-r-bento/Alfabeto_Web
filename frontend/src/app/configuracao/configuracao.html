<header>
  <button class="voltar" title="VOLTAR" routerLink="/"><i class="fa-solid fa-arrow-left"></i></button>
  <h2>CONFIGURAÇÕES</h2>
</header>
<main>
  <div>
    <p>TIPO DE LETRA</p>
  </div>
  <div class="escolha-tema">
    <div class="tipo-letra">
      <input type="radio" id="cursiva" name="tipo" value="cursiva" [(ngModel)]="tipoLetra" (click)="letraCursiva()">
      <label for="cursiva">Cursiva</label><br>
      <input type="radio" id="bastao" name="tipo" value="bastao" [(ngModel)]="tipoLetra" (click)="letraBastao()" checked>
      <label for="bastao">Bastão</label>
    </div>
    <div class="tamanho-letra">
      <input type="radio" id="maiuscula" name="letra" value="maiuscula" [(ngModel)]="tamanhoLetra" (click)="letraMaiuscula()" checked>
      <label for="maiuscula">Maiúscula</label><br>
      <input type="radio" id="minuscula" name="letra" value="minuscula" [(ngModel)]="tamanhoLetra" (click)="letraMinuscula()">
      <label for="minuscula">Minúscula</label>
    </div>
  </div>

  <div class="visualizacao">
    <p>VISUALIZAÇÃO</p>
    <p
      class="fonteDaLetra visualizacao-letras"
      [ngClass]="{ 'fonte-cursiva': tipoLetra === 'cursiva'}"
      id="visualizar-letras"
      >
      {{ letras }}
    </p>
  </div>

  <div>
    <button class="botao-salvar" title="SALVAR" (click)="salvarConfiguracoes()"><i class="fa-solid fa-floppy-disk"></i></button>
    <p class="texto-botao">Salvar</p>
  </div>
</main>
